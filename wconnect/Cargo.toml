[package]
name = "wconnect"
version = "0.1.0"
edition = "2024"
description = "CLI for Wispers Connect nodes"

[[bin]]
name = "wconnect"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4", features = ["derive", "env"] }
dirs = "5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "fs"] }
wispers-connect = { path = "../wispers-connect" }
