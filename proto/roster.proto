// -*- protobuf -*-
// Cryptographic node roster, establishing inter-node trust that cannot be
// subverted by the hub.

syntax = "proto3";
package connect.roster;
option go_package = "connect/client/proto/rosterpb";
option java_package = "dev.wispers.connect.proto.roster";

// The roster is a cryptographically signed list of nodes in a connectivity
// group. It maintains a verifiable history of changes (activations and
// revocations), preventing the hub from unilaterally modifying membership.
message Roster {
  int64 version = 1;
  repeated Node nodes = 2;
  repeated Addendum addenda = 3;
}

// A node in the connectivity group.
message Node {
  int32 node_number = 1;
  bytes public_key_spki = 2;
  // True if this node has been revoked. Revoked nodes remain in the roster
  // for verification purposes but should be ignored for operational use.
  bool revoked = 3;
}

// A single change to the roster history.
message Addendum {
  oneof kind {
    Activation activation = 1;
    Revocation revocation = 2;
  }
}

// Records the activation of a new node.
// Requires two signatures: the new node and an existing endorser.
//
// Both signatures are over a SHA-256 hash of the post-addendum roster (the
// roster as it looks *after* this addendum is applied, with the in-flight
// addendum's signatures excluded from the encoded bytes that get hashed).
// The hash is never transmitted: signers compute it before signing,
// verifiers recompute it from the reconstructed working roster.
message Activation {
  message Payload {
    // Roster version this addendum produces.
    int64 version = 1;
    // The nodes involved in the activation.
    int32 new_node_number = 2;
    int32 endorser_node_number = 3;
    // Nonces binding the PairNodes ceremony to this roster update.
    bytes new_node_nonce = 4;
    bytes endorser_nonce = 5;
  }
  Payload payload = 1;
  bytes new_node_signature = 2;
  bytes endorser_signature = 3;
}

// Records the revocation of a node from the roster.
// Any single activated node can revoke any other node.
//
// The revoker's signature has the same shape as in Activation: it's over a
// SHA-256 of the post-revocation roster with this addendum's signature
// stripped. See Activation for details.
message Revocation {
  message Payload {
    // Roster version this addendum produces.
    int64 version = 1;
    int32 revoked_node_number = 2;
    int32 revoker_node_number = 3;
  }
  Payload payload = 1;
  bytes revoker_signature = 2;
}
