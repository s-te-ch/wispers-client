name: Build Go static libraries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to upload assets to (e.g. v0.8.0). Must include the 'v' prefix. Required unless dry_run is true."
        required: false
      dry_run:
        description: "Build only; skip release upload. Artifacts are still attached to the workflow run for inspection."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin_arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin_amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux_amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux_arm64
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            platform: windows_amd64
    steps:
      - name: Validate version format
        if: ${{ !inputs.dry_run }}
        run: |
          if [[ -z "${{ inputs.version }}" ]]; then
            echo "ERROR: Version is required when dry_run is false"
            exit 1
          fi
          if [[ ! "${{ inputs.version }}" =~ ^v ]]; then
            echo "ERROR: Version must start with 'v' (e.g. v0.8.0), got: ${{ inputs.version }}"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: staticlib-${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libclang-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install -y --no-progress protoc nasm

      - name: Configure LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> "$GITHUB_ENV"

      - name: Build static library
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo rustc -p wispers-connect --release --crate-type staticlib --target ${{ matrix.target }}

      - name: Stage artifact with platform-suffixed name
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/libwispers_connect.a \
             libwispers_connect-${{ matrix.platform }}.a

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwispers_connect-${{ matrix.platform }}
          path: libwispers_connect-${{ matrix.platform }}.a
          if-no-files-found: error

      - name: Upload to release
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          gh release upload ${{ inputs.version }} \
             libwispers_connect-${{ matrix.platform }}.a \
             --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-header:
    name: Upload header
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload header to release
        run: |
          gh release upload ${{ inputs.version }} \
             wispers-connect/include/wispers_connect.h \
             --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
